<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Konklave Komplett</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f4f4;
}

/* ===== LEGENDE ===== */

.legend {
    position: fixed;
    top: 10px;
    right: 10px;
    background: white;
    border: 1px solid #aaa;
    padding: 8px;
    font-size: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    text-align: left;
}

.legend-item {
    display: flex;
    align-items: center;
    margin: 2px 0;
}

.legend-color {
    width: 18px;
    height: 14px;
    margin-right: 6px;
}

/* ===== REST (unverändert) ===== */

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
}

.card {
    width: 130px;
    background: white;
    border: 1px solid #aaa;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    position: relative;
}

.img {
    width: 100%;
    height: 110px;
    background: #ddd;
    background-size: cover;
    background-position: center;
}

.name {
    font-size: 14px;
    font-weight: bold;
    padding: 2px;
}

.bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #eee;
    padding: 2px;
    font-size: 11px;
}

.left {
    display: flex;
    align-items: center;
    gap: 3px;
}

.badge {
    background: black;
    color: white;
    padding: 1px 4px;
    font-size: 11px;
}

.type {
    padding: 1px 4px;
    color: white;
    font-size: 11px;
    background: #ccc;
}

.delete-btn {
    position: absolute;
    top: 2px;
    right: 4px;
    background: red;
    color: white;
    border: none;
    font-size: 11px;
    cursor: pointer;
}

.topbar {
    margin-bottom: 10px;
}

table {
    border-collapse: collapse;
    margin: auto;
    background: white;
}

th, td {
    border: 1px solid #aaa;
    padding: 6px;
    min-width: 70px;
}

input {
    width: 60px;
    text-align: center;
    border: none;
    font-size: 14px;
}

.gold {
    outline: 3px solid gold;
    background: #fff8dc;
}

.need {
    font-size: 11px;
    color: #555;
}

button {
    margin: 5px;
    padding: 6px 10px;
}
</style>
</head>

<body>

<!-- ===== LEGENDE ===== -->
<div class="legend" id="legend">
    <b>Ausrichtungen</b>
</div>

<h2>Konklave</h2>

<button onclick="addCard()">+ Kandidat</button>
<div class="container" id="container"></div>

<hr>

<div class="topbar">
    Wähler gesamt: 
    <input type="number" id="total" value="120" oninput="updateThreshold()">
    
    → 2/3 = 
    <span id="thresholdDisplay">80</span> Stimmen
</div>

<button onclick="addCandidate()">+ Kandidat (Matrix)</button>
<button onclick="addRound()">+ Wahlgang</button>

<table>
    <thead>
        <tr id="header">
            <th>WG</th>
            <th>Info</th>
        </tr>
    </thead>
    <tbody id="body"></tbody>
</table>

<script>

/* ===== AUSRICHTUNGEN ===== */

const colors = {
    ERK: "#050069",
    TRA: "#0500AD",
    KON: "#0500FF",
    GKO: "#008CFF",
    MOD: "#FFD966",
    GLI: "#FFA1A1",
    LIB: "#FF7575",
    PRO: "#FF0000",
    SPR: "#B30C0C"
};

const labels = {
    ERK: "Erzkonservativ",
    TRA: "Traditionell",
    KON: "Konservativ",
    GKO: "Gemäßigt konservativ",
    MOD: "Moderat",
    GLI: "Gemäßigt liberal",
    LIB: "Liberal",
    PRO: "Progressiv",
    SPR: "Stark progressiv"
};

const types = Object.keys(colors);

/* ===== LEGENDE ERSTELLEN ===== */

function buildLegend() {
    const legend = document.getElementById("legend");

    types.forEach(t => {
        const div = document.createElement("div");
        div.className = "legend-item";

        div.innerHTML = `
            <div class="legend-color" style="background:${colors[t]}"></div>
            <span>${t} – ${labels[t]}</span>
        `;

        legend.appendChild(div);
    });
}

/* ===== KARTEN ===== */

const maxCards = 10;

function createCard() {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
        <button class="delete-btn" onclick="this.parentElement.remove()">X</button>
        <div class="img" onclick="uploadImage(this)"></div>
        <div class="name" onclick="editText(this)">Name</div>

        <div class="bar">
            <div class="left">
                <span onclick="editText(this)">🏳️</span>
                <span class="badge" onclick="editText(this)">0</span>
                <span class="badge" onclick="editText(this)">0</span>
            </div>
            <span class="type" onclick="cycleType(this)" data-type="">---</span>
        </div>
    `;
    return div;
}

function addCard() {
    const c = document.getElementById("container");
    if (c.children.length < maxCards) c.appendChild(createCard());
}

function editText(el) {
    const val = prompt("Wert eingeben:", el.innerText);
    if (val !== null) el.innerText = val;
}

function cycleType(el) {
    let current = el.dataset.type || "";
    let i = types.indexOf(current);

    i = (i + 1) % types.length;
    const newType = types[i];

    el.dataset.type = newType;
    el.innerText = newType;
    el.style.background = colors[newType];
}

function uploadImage(div) {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";

    input.onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => {
            div.style.backgroundImage = `url(${ev.target.result})`;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    input.click();
}

/* ===== MATRIX ===== */

let rounds = 0;
let candidates = 0;
let threshold = 80;

function updateThreshold() {
    const total = Number(document.getElementById("total").value) || 0;
    threshold = Math.ceil((2/3) * total);
    document.getElementById("thresholdDisplay").innerText = threshold;
    checkMajority();
}

function addCandidate() {
    candidates++;

    const th = document.createElement("th");
    th.innerHTML = `<input placeholder="Name">`;
    document.getElementById("header").appendChild(th);

    document.querySelectorAll("#body tr").forEach(row => {
        const td = document.createElement("td");
        td.innerHTML = `<input type="number" value="0" oninput="checkMajority()">`;
        row.appendChild(td);
    });
}

function addRound() {
    rounds++;

    const tr = document.createElement("tr");

    let row = `
        <td><b>WG ${rounds}</b></td>
        <td class="need">benötigt: <span>${threshold}</span></td>
    `;

    for (let i = 0; i < candidates; i++) {
        row += `<td><input type="number" value="0" oninput="checkMajority()"></td>`;
    }

    tr.innerHTML = row;
    document.getElementById("body").appendChild(tr);
}

function checkMajority() {
    document.querySelectorAll("#body tr").forEach(row => {
        row.querySelectorAll("input").forEach(i => {
            i.classList.remove("gold");
            if (Number(i.value) >= threshold) {
                i.classList.add("gold");
            }
        });

        const need = row.querySelector(".need span");
        if (need) need.innerText = threshold;
    });
}

/* ===== START ===== */

buildLegend();
updateThreshold();

for (let i = 0; i < 5; i++) addCard();
for (let i = 0; i < 3; i++) addCandidate();
for (let i = 0; i < 3; i++) addRound();

</script>

</body>
</html>
